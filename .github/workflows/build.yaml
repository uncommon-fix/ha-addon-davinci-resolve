name: Build add-on

# Builds the DaVinci Resolve Postgres add-on multi-arch (aarch64 + amd64)
# and publishes the image to GitHub Container Registry. Triggered by
# pushing a version tag (the tag is bookkeeping; the published image tag
# comes from config.yaml's `version:` field, which must match) or
# manually via the Actions tab.
#
# NOTE: the first push creates a PRIVATE ghcr.io package. The Supervisor
# pulls anonymously, so set the package visibility to Public once in the
# GitHub UI (package → Package settings → Change visibility) or installs
# fail with `denied`.

on:
  push:
    tags:
      - "*"
  workflow_dispatch:

jobs:
  prepare:
    name: Prepare
    runs-on: ubuntu-latest
    outputs:
      architectures: ${{ steps.info.outputs.architectures }}
      build_matrix: ${{ steps.matrix.outputs.matrix }}
      image_name: ${{ steps.normalize.outputs.image_name }}
      registry_prefix: ${{ steps.normalize.outputs.registry_prefix }}
      name: ${{ steps.normalize.outputs.name }}
      description: ${{ steps.normalize.outputs.description }}
      url: ${{ steps.normalize.outputs.url }}
      version: ${{ steps.normalize.outputs.version }}
    steps:
      - name: Check out the repository
        uses: actions/checkout@v4

      - name: Get add-on information
        id: info
        uses: home-assistant/actions/helpers/info@master
        with:
          path: "."

      - name: Normalize add-on information
        id: normalize
        run: |
          image="${{ steps.info.outputs.image }}"
          echo "image_name=${image##*/}" >> "$GITHUB_OUTPUT"
          echo "registry_prefix=${image%/*}" >> "$GITHUB_OUTPUT"
          # info emits the YAML-quoted version (e.g. "0.1.0-alpha.1"); strip
          # the quotes so it's a valid image tag.
          raw_version='${{ steps.info.outputs.version }}'
          echo "version=${raw_version//\"/}" >> "$GITHUB_OUTPUT"
          echo "name=${{ steps.info.outputs.name }}" >> "$GITHUB_OUTPUT"
          echo "description=${{ steps.info.outputs.description }}" >> "$GITHUB_OUTPUT"
          url="${{ steps.info.outputs.url }}"
          if [[ -n "$url" && "$url" != "null" ]]; then
            echo "url=${url}" >> "$GITHUB_OUTPUT"
          fi

      - name: Prepare build matrix
        id: matrix
        uses: home-assistant/builder/actions/prepare-multi-arch-matrix@2026.03.2
        with:
          architectures: ${{ steps.info.outputs.architectures }}
          image-name: ${{ steps.normalize.outputs.image_name }}
          registry-prefix: ${{ steps.normalize.outputs.registry_prefix }}

  build:
    name: Build ${{ matrix.arch }} image
    needs: prepare
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
      id-token: write
      packages: write
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.prepare.outputs.build_matrix) }}
    steps:
      - name: Check out the repository
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Build image
        uses: home-assistant/builder/actions/build-image@2026.03.2
        with:
          arch: ${{ matrix.arch }}
          image: ${{ matrix.image }}
          context: "."
          container-registry-password: ${{ secrets.GITHUB_TOKEN }}
          version: ${{ needs.prepare.outputs.version }}
          push: true
          image-tags: |
            ${{ needs.prepare.outputs.version }}
            latest
          labels: |
            io.hass.type=addon
            io.hass.name=${{ needs.prepare.outputs.name }}
            io.hass.description=${{ needs.prepare.outputs.description }}
            ${{ needs.prepare.outputs.url && format('io.hass.url={0}', needs.prepare.outputs.url) || '' }}

  manifest:
    name: Publish multi-arch manifest
    needs: [prepare, build]
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      packages: write
    steps:
      - name: Publish multi-arch manifest
        uses: home-assistant/builder/actions/publish-multi-arch-manifest@2026.03.2
        with:
          architectures: ${{ needs.prepare.outputs.architectures }}
          image-name: ${{ needs.prepare.outputs.image_name }}
          registry-prefix: ${{ needs.prepare.outputs.registry_prefix }}
          container-registry-password: ${{ secrets.GITHUB_TOKEN }}
          image-tags: |
            ${{ needs.prepare.outputs.version }}
            latest
